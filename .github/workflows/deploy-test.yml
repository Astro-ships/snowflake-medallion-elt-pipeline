
name: Deploy Snowflake Pipeline 


on:
    push:
        branches:
            - main

jobs:
    deploy:
        name: Deploy to test snowflake
        runs-on: ubuntu-latest 
        env:
            SNOWFLAKE_ACCOUNT: ${{secrets.SNOWFLAKE_ACCOUNT}}
            SNOWFLAKE_USER: ${{secrets.SNOWFLAKE_USER}}
            SNOWFLAKE_PASSWORD: ${{secrets.SNOWFLAKE_PASSWORD}}
            SNOWFLAKE_ROLE: ${{secrets.SNOWFLAKE_ROLE}}
            SNOWFLAKE_WAREHOUSE: ${{secrets.SNOWFLAKE_WAREHOUSE}}

# Step 1:
        steps:
            - name: Checkout Repository 
              uses: actions/checkout@v4
# Step 2:
            - name: Install SnowSQL 
              run: | 
                 wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-linux_x86_64.bash
                 bash snowsql-linux_x86_64.bash

# Step 3: 
            - name: Test Snowflake Connection
              run: | 
                Snowsql\
                 -a "$SNOWFLAKE_ACCOUNT" \
                 -u "$SNOWFLAKE_USER" \
                 -p "$SNOWFLAKE_PASSWORD"\
                 -r "$SNOWFLAKE_ROLE"\
                 -w "$SNOWFLAKE_WAREHOUSE"\
                 -q "SELECT_CURRENT_ACCOUNT(),CURRENT_ROLE(),CURRENT_WAREHOUSE();"